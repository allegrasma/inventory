<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allegra — Props & Costumes Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --surface2:#242424;
      --border:  #2e2e2e;
      --text:    #f0ece4;
      --muted:   #888;
      --accent:  #c9a84c;
      --green:   #3a9e5a;
      --red:     #c0392b;
      --grey:    #555;
      --zone-a:  #E87722;
      --zone-b:  #4A90D9;
      --zone-c:  #D4B800;
      --zone-d:  #5A9E3A;
      --zone-e:  #8B4FBF;
      --radius:  10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; min-height: 100vh; }

    /* ── Header ── */
    header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--accent); letter-spacing: 0.02em; }
    header span { color: var(--muted); font-size: 13px; }
    .add-item-btn { margin-left: auto; background: var(--accent); color: #000; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 6px; text-decoration: none; white-space: nowrap; }
    .add-item-btn:hover { opacity: 0.85; }

    /* ── Layout ── */
    .shell { display: flex; min-height: calc(100vh - 69px); }

    /* ── Sidebar ── */
    aside { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; }
    .filter-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .filter-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 8px 10px; appearance: none; cursor: pointer; }
    .filter-group select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .zone-pills { display: flex; flex-direction: column; gap: 6px; }
    .zone-pill { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 13px; transition: border-color 0.15s; user-select: none; }
    .zone-pill:hover { border-color: var(--muted); }
    .zone-pill.active { border-color: var(--accent); background: #1e1c16; }
    .zone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .reset-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 12px; padding: 8px; cursor: pointer; transition: color 0.15s, border-color 0.15s; width: 100%; }
    .reset-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── Main ── */
    main { flex: 1; padding: 24px 28px; overflow: auto; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
    #search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 9px 14px; width: 280px; }
    #search-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    #search-input::placeholder { color: var(--muted); }
    #result-count { color: var(--muted); font-size: 13px; white-space: nowrap; }

    /* ── List rows ── */
    #grid { display: flex; flex-direction: column; gap: 10px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; flex-direction: row; align-items: stretch; }
    .card:hover { border-color: var(--accent); background: var(--surface2); }
    .card-img-wrap { width: 110px; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; padding: 8px; border-right: 1px solid var(--border); }
    .card-img { max-width: 100%; max-height: 90px; width: auto; height: auto; object-fit: contain; display: block; border-radius: 4px; }
    .card-no-img { width: 110px; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 28px; padding: 8px; border-right: 1px solid var(--border); }
    .card-body { padding: 12px 16px; display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .zone-badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 10px; color: #000; white-space: nowrap; }
    .status-pill { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .status-available { background: rgba(58,158,90,0.15); color: #5ec47a; border: 1px solid rgba(58,158,90,0.3); }
    .status-checkedout { background: rgba(192,57,43,0.15); color: #e05c4b; border: 1px solid rgba(192,57,43,0.3); }
    .status-missing { background: rgba(85,85,85,0.2); color: var(--muted); border: 1px solid var(--border); }
    .card-type { font-size: 15px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
    .card-category { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .card-attrs { display: flex; flex-wrap: wrap; gap: 5px; }
    .attr-chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

    /* ── Modal ── */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    #modal-overlay.open { display: flex; }
    #modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); max-width: 680px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    #modal-close { position: absolute; top: 14px; right: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    #modal-img { width: 100%; max-height: 380px; object-fit: contain; display: block; background: var(--surface2); border-radius: var(--radius) var(--radius) 0 0; padding: 16px; }
    #modal-no-img { width: 100%; height: 160px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 48px; border-radius: var(--radius) var(--radius) 0 0; }
    #modal-body { padding: 24px; }
    #modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    #modal-status { margin-bottom: 16px; }
    #modal-type { font-family: 'Playfair Display', serif; font-size: 24px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; margin-bottom: 20px; }
    .detail-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .detail-value { font-size: 14px; color: var(--text); }
    #modal-notes { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 16px; }

    /* ── Action buttons ── */
    .action-area { border-top: 1px solid var(--border); padding: 20px 24px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-checkout { background: var(--accent); color: #000; }
    .btn-checkin  { background: var(--green); color: #fff; }
    .btn-missing  { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-missing:hover { color: var(--text); border-color: var(--muted); }
    .checkout-info { font-size: 13px; color: var(--muted); padding: 4px 0; }
    .overdue-warning { font-size: 12px; color: #e05c4b; margin-top: 4px; }

    /* ── Checkout form inside modal ── */
    .checkout-form { border-top: 1px solid var(--border); padding: 20px 24px; display: none; flex-direction: column; gap: 14px; }
    .checkout-form.open { display: flex; }
    .checkout-form label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
    .checkout-form input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 9px 12px; }
    .checkout-form input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .form-actions { display: flex; gap: 10px; }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-submit { background: var(--accent); color: #000; }

    /* ── States ── */
    #loading, #empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    #loading::after { content: ''; display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-left: 10px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      aside { display: none; }
      header { padding: 16px; }
      main { padding: 16px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Allegra — Props & Costumes</h1>
  <span id="header-count"></span>
  <a class="add-item-btn" href="https://forms.gle/oCRKneoX8Asct7838" target="_blank">+ Add Item</a>
</header>

<div class="shell">
  <aside>
    <div class="filter-group">
      <label>Zone</label>
      <div class="zone-pills" id="zone-pills">
        <div class="zone-pill active" data-zone="all"><span class="zone-dot" style="background:#555"></span> All zones</div>
        <div class="zone-pill" data-zone="A"><span class="zone-dot" style="background:var(--zone-a)"></span> A — Small Props</div>
        <div class="zone-pill" data-zone="B"><span class="zone-dot" style="background:var(--zone-b)"></span> B — Body Accessories</div>
        <div class="zone-pill" data-zone="C"><span class="zone-dot" style="background:var(--zone-c)"></span> C — Large Props</div>
        <div class="zone-pill" data-zone="D"><span class="zone-dot" style="background:var(--zone-d)"></span> D — Clothing</div>
        <div class="zone-pill" data-zone="E"><span class="zone-dot" style="background:var(--zone-e)"></span> E — Fabrics</div>
      </div>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filter-status">
        <option value="">All items</option>
        <option value="Available">Available</option>
        <option value="Checked Out">Checked Out</option>
        <option value="Missing">Missing</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select id="filter-category">
        <option value="">All categories</option>
        <option>Small Props</option>
        <option>Body Accessories</option>
        <option>Fabrics</option>
        <option>Large Props</option>
        <option>Clothing</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Type</label>
      <select id="filter-type"><option value="">All types</option></select>
    </div>
    <div class="filter-group">
      <label>Color</label>
      <select id="filter-color">
        <option value="">All colors</option>
        <option>Purple</option><option>Blue</option><option>Green</option>
        <option>Yellow</option><option>Orange</option><option>Red</option>
        <option>Black</option><option>White</option><option>Grey</option>
        <option>Silver</option><option>Gold</option><option>Brown</option>
        <option>Bronze</option><option>Multicolored</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Size</label>
      <select id="filter-size">
        <option value="">All sizes</option>
        <option>S</option><option>M</option><option>L</option>
        <option>XL</option><option>XXL</option><option>One Size</option><option>See Notes</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Storage Type</label>
      <select id="filter-storage">
        <option value="">All storage</option>
        <option>Rack</option><option>Box</option><option>Shelf</option>
        <option>Floor</option><option>Other</option>
      </select>
    </div>
    <button class="reset-btn" id="reset-btn">Reset all filters</button>
  </aside>

  <main>
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search by type, category, notes…" />
      <span id="result-count"></span>
    </div>
    <div id="grid"><div id="loading">Loading inventory</div></div>
  </main>
</div>

<!-- Detail + checkout modal -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal">
    <button id="modal-close" aria-label="Close">×</button>
    <div id="modal-img-wrap"></div>
    <div id="modal-body">
      <div id="modal-header">
        <span id="modal-zone-badge" class="zone-badge"></span>
        <span id="modal-type"></span>
      </div>
      <div id="modal-status"></div>
      <div class="detail-grid" id="modal-details"></div>
      <div id="modal-notes-wrap" style="display:none">
        <div class="detail-label">Notes</div>
        <div id="modal-notes"></div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-area" id="action-area"></div>

    <!-- Inline checkout form -->
    <div class="checkout-form" id="checkout-form">
      <div>
        <label>Your Name</label>
        <input type="text" id="co-name" placeholder="First and last name" />
      </div>
      <div>
        <label>Due Date</label>
        <input type="date" id="co-date" />
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" id="co-cancel">Cancel</button>
        <button class="btn btn-submit" id="co-submit">Confirm Check Out</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────
  // IMPORTANT: Replace with your deployed Apps Script web app URL
  const API_URL = 'https://script.google.com/macros/s/AKfycbxuafZvubpVvEKCytNnHNuz47d4daa9tbfYMSJYVemxe4ykbQ7jBKUlrH-3N0qcjwq4/exec';

  const ZONE_COLORS = {
    A: { hex: '#E87722', label: 'Small Props' },
    B: { hex: '#4A90D9', label: 'Body Accessories' },
    C: { hex: '#D4B800', label: 'Large Props' },
    D: { hex: '#5A9E3A', label: 'Clothing' },
    E: { hex: '#8B4FBF', label: 'Fabrics' },
  };

  const TYPE_BY_CATEGORY = {
    'Small Props':      ['Electronics','Food','Games','Homewear','Misc Props','Party Decorations','Plants','Ropes','Sports'],
    'Body Accessories': ['Animal Hats','Aprons','Bandanas','Boas','Funky Hats','Gloves and Socks','Masks / Headbands','Misc Accessories','Non Funky Hats','Scarves','Shoes','Straw Hats','Suspenders','Ties','Umbrellas','Wigs'],
    'Large Props':      ['Bags & Suitcases','Furniture','Loose Fabrics','Misc','Weapons'],
    'Clothing':         ['Cardigans / Blazers / Coats','Dresses','Skirts','T-Shirts','Tops','Trousers','Weird'],
    'Fabrics':          ['Linens','Misc Fabrics','Sparkly'],
  };

  let allItems = [];
  let activeZone = 'all';
  let currentItem = null;

  // ── Helpers ─────────────────────────────────────────────────
  function getZoneLetter(zoneField) {
    if (!zoneField) return '';
    return zoneField.trim().charAt(0).toUpperCase();
  }

  function photoUrl(raw) {
    if (!raw) return null;
    const m1 = raw.match(/[?&]id=([^&]+)/);
    if (m1) return `https://lh3.googleusercontent.com/d/${m1[1]}`;
    const m2 = raw.match(/\/d\/([^/]+)\//);
    if (m2) return `https://lh3.googleusercontent.com/d/${m2[1]}`;
    return null;
  }

  function statusClass(status) {
    if (status === 'Checked Out') return 'status-checkedout';
    if (status === 'Missing')     return 'status-missing';
    return 'status-available';
  }

  function isOverdue(dueDate) {
    if (!dueDate) return false;
    const due = new Date(dueDate);
    if (isNaN(due.getTime())) return false;
    return due < new Date();
  }

  // ── Load inventory from Apps Script ─────────────────────────
  async function loadInventory() {
    try {
      const res = await fetch(`${API_URL}?action=inventory`);
      const data = await res.json();
      if (!data.success) throw new Error('API error');
      allItems = data.items;
      document.getElementById('header-count').textContent = `${allItems.length} items`;
      applyFilters();
    } catch (e) {
      document.getElementById('grid').innerHTML = '<div id="empty">Could not load inventory. Check API URL or Sheet permissions.</div>';
    }
  }

  // ── Render ──────────────────────────────────────────────────
  function renderCards(items) {
    const grid = document.getElementById('grid');
    const count = document.getElementById('result-count');

    if (items.length === 0) {
      grid.innerHTML = '<div id="empty">No items match your filters.</div>';
      count.textContent = '0 items';
      return;
    }

    count.textContent = `${items.length} item${items.length === 1 ? '' : 's'}`;

    grid.innerHTML = items.map((item, idx) => {
      const zone = getZoneLetter(item.zone);
      const zc = ZONE_COLORS[zone] || { hex: '#555', label: '' };
      const img = photoUrl(item.photo);
      const storage = [item.storageType, item.storageNum].filter(Boolean).join(' ');
      const badge = storage ? `${zone} — ${storage}` : zone;
      const status = item.status || 'Available';
      const sc = statusClass(status);
      const statusLabel = status === 'Checked Out' && item.borrower ? `Checked Out — ${item.borrower}` : status;

      return `
        <div class="card" data-idx="${idx}" tabindex="0" role="button">
          ${img
            ? `<div class="card-img-wrap"><img class="card-img" src="${img}" alt="${item.type}" loading="lazy" onerror="this.parentElement.outerHTML='<div class=card-no-img>🎭</div>'"></div>`
            : '<div class="card-no-img">🎭</div>'}
          <div class="card-body">
            <div class="card-top">
              <span class="zone-badge" style="background:${zc.hex}">${badge}</span>
              <span class="status-pill ${sc}">${statusLabel}</span>
            </div>
            <div class="card-type">${item.type || '—'}</div>
            <div class="card-category">${item.category || ''}</div>
            <div class="card-attrs">
              ${item.color && item.color !== 'N/A' ? `<span class="attr-chip">${item.color}</span>` : ''}
              ${item.size ? `<span class="attr-chip">${item.size}</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
      const open = () => openModal(items[+card.dataset.idx]);
      card.addEventListener('click', open);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
    });
  }

  // ── Filter ──────────────────────────────────────────────────
  function applyFilters() {
    const q       = document.getElementById('search-input').value.toLowerCase();
    const status  = document.getElementById('filter-status').value;
    const cat     = document.getElementById('filter-category').value;
    const type    = document.getElementById('filter-type').value;
    const color   = document.getElementById('filter-color').value;
    const size    = document.getElementById('filter-size').value;
    const storage = document.getElementById('filter-storage').value;

    const filtered = allItems.filter(item => {
      const zone = getZoneLetter(item.zone);
      if (activeZone !== 'all' && zone !== activeZone) return false;
      if (status  && (item.status || 'Available') !== status) return false;
      if (cat     && item.category    !== cat)     return false;
      if (type    && item.type        !== type)    return false;
      if (color   && item.color       !== color)   return false;
      if (size    && item.size        !== size)    return false;
      if (storage && item.storageType !== storage) return false;
      if (q) {
        const s = [item.type, item.category, item.color, item.notes, item.zone, item.borrower].join(' ').toLowerCase();
        if (!s.includes(q)) return false;
      }
      return true;
    });

    renderCards(filtered);
  }

  // ── Type dropdown ────────────────────────────────────────────
  function updateTypeDropdown(cat) {
    const sel = document.getElementById('filter-type');
    const prev = sel.value;
    sel.innerHTML = '<option value="">All types</option>';
    const types = cat ? (TYPE_BY_CATEGORY[cat] || []) : Object.values(TYPE_BY_CATEGORY).flat();
    types.slice().sort((a, b) => a.localeCompare(b)).forEach(t => {
      const o = document.createElement('option');
      o.value = o.textContent = t;
      if (t === prev) o.selected = true;
      sel.appendChild(o);
    });
  }

  // ── Modal ────────────────────────────────────────────────────
  function openModal(item) {
    currentItem = item;
    const zone = getZoneLetter(item.zone);
    const zc = ZONE_COLORS[zone] || { hex: '#555', label: '' };
    const img = photoUrl(item.photo);
    const status = item.status || 'Available';

    // Image
    const wrap = document.getElementById('modal-img-wrap');
    wrap.innerHTML = img
      ? `<img id="modal-img" src="${img}" alt="${item.type}" onerror="this.parentElement.innerHTML='<div id=modal-no-img>🎭</div>'">`
      : '<div id="modal-no-img">🎭</div>';

    // Badge + type
    const storage = [item.storageType, item.storageNum].filter(Boolean).join(' ');
    const badge = document.getElementById('modal-zone-badge');
    badge.textContent = storage ? `${zone} — ${storage}` : zone;
    badge.style.background = zc.hex;
    document.getElementById('modal-type').textContent = item.type || '—';

    // Status
    const sc = statusClass(status);
    const overdueFlag = status === 'Checked Out' && isOverdue(item.dueDate);
    document.getElementById('modal-status').innerHTML = `
      <span class="status-pill ${sc}" style="font-size:13px;padding:4px 12px">${status}</span>
      ${overdueFlag ? '<div class="overdue-warning">⚠ Overdue</div>' : ''}
    `;

    // Details
    const details = [
      { label: 'Category',   value: item.category },
      { label: 'Zone',       value: item.zone },
      { label: 'Color',      value: item.color },
      { label: 'Size',       value: item.size },
      { label: 'Item ID',    value: item.itemId },
      { label: 'Date Added', value: item.timestamp ? new Date(item.timestamp).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '' },
      ...(status === 'Checked Out' ? [
        { label: 'Checked Out To', value: item.borrower },
        { label: 'Due Date',       value: item.dueDate ? new Date(item.dueDate).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '' },
      ] : []),
    ];

    document.getElementById('modal-details').innerHTML = details
      .filter(d => d.value && d.value !== 'N/A')
      .map(d => `<div class="detail-item"><div class="detail-label">${d.label}</div><div class="detail-value">${d.value}</div></div>`)
      .join('');

    // Notes
    const notesWrap = document.getElementById('modal-notes-wrap');
    if (item.notes) {
      notesWrap.style.display = 'block';
      document.getElementById('modal-notes').textContent = item.notes;
    } else {
      notesWrap.style.display = 'none';
    }

    // Action buttons
    const actionArea = document.getElementById('action-area');
    if (status === 'Available') {
      actionArea.innerHTML = `
        <button class="btn btn-checkout" id="btn-checkout">Check Out</button>
        <button class="btn btn-missing" id="btn-missing">Mark Missing</button>`;
      document.getElementById('btn-checkout').addEventListener('click', openCheckoutForm);
      document.getElementById('btn-missing').addEventListener('click', doMarkMissing);
    } else if (status === 'Checked Out') {
      actionArea.innerHTML = `
        <button class="btn btn-checkin" id="btn-checkin">Check In</button>
        <button class="btn btn-missing" id="btn-missing">Mark Missing</button>`;
      document.getElementById('btn-checkin').addEventListener('click', doCheckIn);
      document.getElementById('btn-missing').addEventListener('click', doMarkMissing);
    } else {
      actionArea.innerHTML = `
        <button class="btn btn-checkin" id="btn-checkin">Mark as Found / Available</button>`;
      document.getElementById('btn-checkin').addEventListener('click', doCheckIn);
    }

    // Reset checkout form
    document.getElementById('checkout-form').classList.remove('open');
    document.getElementById('co-name').value = '';
    document.getElementById('co-date').value = '';

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    currentItem = null;
  }

  // ── Checkout form ────────────────────────────────────────────
  function openCheckoutForm() {
    document.getElementById('checkout-form').classList.add('open');
    document.getElementById('co-name').focus();
  }

  async function doCheckOut() {
    const name = document.getElementById('co-name').value.trim();
    const date = document.getElementById('co-date').value;
    if (!name) { alert('Please enter your name.'); return; }
    if (!date) { alert('Please enter a due date.'); return; }

    const btn = document.getElementById('co-submit');
    btn.textContent = 'Checking out…';
    btn.disabled = true;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action:   'checkout',
          rowIndex: currentItem.rowIndex,
          itemId:   currentItem.itemId,
          itemType: currentItem.type,
          zone:     currentItem.zone,
          borrower: name,
          dueDate:  date,
        }),
      });
      const data = await res.json();
      if (data.success) {
        currentItem.status   = 'Checked Out';
        currentItem.borrower = name;
        currentItem.dueDate  = date;
        closeModal();
        await loadInventory();
      } else {
        alert('Something went wrong. Please try again.');
      }
    } catch (e) {
      alert('Could not connect. Please check your connection and try again.');
    } finally {
      btn.textContent = 'Confirm Check Out';
      btn.disabled = false;
    }
  }

  async function doCheckIn() {
    if (!confirm(`Check in "${currentItem.type}"?`)) return;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action:   'checkin',
          rowIndex: currentItem.rowIndex,
          itemId:   currentItem.itemId,
          itemType: currentItem.type,
          zone:     currentItem.zone,
          borrower: currentItem.borrower,
        }),
      });
      const data = await res.json();
      if (data.success) {
        closeModal();
        await loadInventory();
      } else {
        alert('Something went wrong. Please try again.');
      }
    } catch (e) {
      alert('Could not connect. Please try again.');
    }
  }

  async function doMarkMissing() {
    if (!confirm(`Mark "${currentItem.type}" as missing?`)) return;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action:   'missing',
          rowIndex: currentItem.rowIndex,
          itemId:   currentItem.itemId,
          itemType: currentItem.type,
          zone:     currentItem.zone,
        }),
      });
      const data = await res.json();
      if (data.success) {
        closeModal();
        await loadInventory();
      } else {
        alert('Something went wrong. Please try again.');
      }
    } catch (e) {
      alert('Could not connect. Please try again.');
    }
  }

  // ── Event listeners ──────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  document.getElementById('filter-category').addEventListener('change', function() { updateTypeDropdown(this.value); applyFilters(); });
  document.getElementById('filter-type').addEventListener('change', applyFilters);
  document.getElementById('filter-color').addEventListener('change', applyFilters);
  document.getElementById('filter-size').addEventListener('change', applyFilters);
  document.getElementById('filter-storage').addEventListener('change', applyFilters);

  document.getElementById('zone-pills').addEventListener('click', e => {
    const pill = e.target.closest('.zone-pill');
    if (!pill) return;
    document.querySelectorAll('.zone-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeZone = pill.dataset.zone;
    applyFilters();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-category').value = '';
    document.getElementById('filter-color').value = '';
    document.getElementById('filter-size').value = '';
    document.getElementById('filter-storage').value = '';
    updateTypeDropdown('');
    document.getElementById('filter-type').value = '';
    activeZone = 'all';
    document.querySelectorAll('.zone-pill').forEach(p => p.classList.remove('active'));
    document.querySelector('.zone-pill[data-zone="all"]').classList.add('active');
    applyFilters();
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('co-cancel').addEventListener('click', () => document.getElementById('checkout-form').classList.remove('open'));
  document.getElementById('co-submit').addEventListener('click', doCheckOut);

  updateTypeDropdown('');
  loadInventory();
</script>
</body>
</html>
